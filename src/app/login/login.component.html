<div class="col-md-6 offset-md-3 mt-5">
  <div class="card">
    <h4 class="card-header">Sign In</h4>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="border border-light p-5">

        <input type="text" formControlName="username" class="form-control mb-4" placeholder="Username">

        <input type="password" formControlName="password" class="form-control mb-4" placeholder="Password">

        <button class="btn btn-info btn-block my-4" type="submit">Sign in</button>

    </form>
    <div class="register-link">
      Not yet registered? <a routerLink="/register">Register Now</a>
    </div>
  </div>
</div>
