<div class="col-md-6 offset-md-3 mt-5">
  <mdb-card>
    <mdb-card-header class="info-color white-text text-center py-3">
      <h4><strong>Login</strong></h4>
    </mdb-card-header>

    <!--Card content-->
    <mdb-card-body class="px-lg-5 pt-0">

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="text-center" style="color: #757575;">

        <!-- Username -->
        <div class="md-form md-outline">
          <input type="text" formControlName="username" class="form-control" mdbInput mdbValidate>
          <label for="username">Username</label>
          <mdb-error *ngIf="username.invalid">
            <div *ngIf="username.errors.required && (username.dirty || username.touched) || formSubmitAttempt">
              Username is required
            </div>
          </mdb-error>
        </div>

        <!-- Password -->
        <div class="md-form mt-0 md-outline">
          <input type="password" formControlName="password" class="form-control" mdbInput mdbValidate>
          <label for="password">Password</label>
          <mdb-error *ngIf="password.invalid">
            <div *ngIf="password.errors.required && (password.dirty || password.touched) || formSubmitAttempt">
              Password is required
            </div>
          </mdb-error>
        </div>

        <!-- Login button -->
        <button mdbBtn color="info" block="true" class="my-4" type="submit">Login</button>

        <p id="form-error" [hidden]="!displayError">Username and Password don't match any of our records</p>

        <!-- Register -->
        <div class="register-link">
          Not registered? <a routerLink="/register">Register Now</a>
        </div>
      </form>

    </mdb-card-body>

  </mdb-card>
</div>
